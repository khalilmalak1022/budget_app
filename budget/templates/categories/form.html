{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4><i class="bi bi-tags"></i> Catégorie</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" name="nom"
                            class="form-control"
                            value="{{ form.nom.value|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Couleur</label>
                        <input type="color" name="couleur"
                            class="form-control form-control-color"
                            value="{{ form.couleur.value|default:'#3498db' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Icône (optionnel)</label>
                        <input type="text" name="icone"
                            class="form-control"
                            value="{{ form.icone.value|default:'' }}"
                            placeholder="ex: bi-cart">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i> Enregistrer
                        </button>
                        <a href="{% url 'categorie_liste' %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
