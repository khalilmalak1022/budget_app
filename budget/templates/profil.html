{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4><i class="bi bi-person-circle"></i> Mon Profil</h4>
            </div>
            <div class="card-body p-4">

                <!-- Informations utilisateur -->
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                            style="width:50px;height:50px;font-size:20px;font-weight:500">
                            {{ user.username|first|upper }}
                        </div>
                        <div>
                            <h5 class="mb-0">{{ user.username }}</h5>
                            <small class="text-muted">{{ user.email }}</small>
                        </div>
                    </div>
                </div>

                <!-- Modifier devise -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h6><i class="bi bi-currency-exchange"></i> Devise</h6>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Choisir la devise</label>
                                <select name="devise" class="form-select">
                                    <option value="DH" {% if user.profil.devise == 'DH' %}selected{% endif %}>Dirham (DH)</option>
                                    <option value="EUR" {% if user.profil.devise == 'EUR' %}selected{% endif %}>Euro (€)</option>
                                    <option value="USD" {% if user.profil.devise == 'USD' %}selected{% endif %}>Dollar ($)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Enregistrer
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
