{% extends 'base.html' %}

{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-5">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;">
      <div class="p-5 text-center">
        <div class="mb-4" style="font-size:3.5rem;">
          <i class="bi bi-trash3-fill" style="color:var(--accent2);"></i>
        </div>
        <h5 class="fw-bold mb-2" style="font-family:'Syne',sans-serif;color:var(--text);">{{ titre }}</h5>
        <p style="color:var(--text2);">{{ message }}</p>
        <form method="post" class="d-flex gap-3 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn fw-semibold"
                  style="background:var(--accent2);border:none;color:#fff;border-radius:12px;padding:10px 24px;">
            <i class="bi bi-trash me-1"></i> Supprimer
          </button>
          <a href="{% url retour %}" class="btn"
             style="background:var(--card2);border:1px solid var(--border);color:var(--text2);border-radius:12px;padding:10px 24px;">
            Annuler
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
