{% extends 'base.html' %}

{% block content %}
<div class="page-title">Mon Profil</div>
<div class="page-subtitle">Gérez vos informations personnelles</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header" style="background:linear-gradient(135deg,#0f3460,#1a5276);color:#fff">
                <h5 class="mb-0"><i class="bi bi-person-circle"></i> Informations</h5>
            </div>
            <div class="card-body p-4">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div style="width:60px;height:60px;background:linear-gradient(135deg,#e94560,#0f3460);
                        border-radius:50%;display:flex;align-items:center;justify-content:center;
                        font-size:24px;font-weight:700;color:#fff">
                        {{ user.username|first|upper }}
                    </div>
                    <div>
                        <h5 class="mb-0 fw-600">{{ user.username }}</h5>
                        <small class="text-muted">{{ user.email }}</small>
                    </div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Devise préférée</label>
                        <select name="devise" class="form-select">
                            <option value="DH" {% if user.profil.devise == 'DH' %}selected{% endif %}>
                                🇲🇦 Dirham (DH)
                            </option>
                            <option value="EUR" {% if user.profil.devise == 'EUR' %}selected{% endif %}>
                                🇪🇺 Euro (€)
                            </option>
                            <option value="USD" {% if user.profil.devise == 'USD' %}selected{% endif %}>
                                🇺🇸 Dollar ($)
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-save"></i> Enregistrer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
