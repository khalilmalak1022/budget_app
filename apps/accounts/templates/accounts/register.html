{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <h1>◈ BudgetApp</h1>
        <p>Créez votre compte gratuitement</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="votre_nom" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@exemple.com" required>
        </div>
        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password1" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Confirmer</label>
                <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Devise préférée</label>
            <select name="devise" class="form-select">
                <option value="DH">🇲🇦 Dirham (DH)</option>
                <option value="EUR">🇪🇺 Euro (€)</option>
                <option value="USD">🇺🇸 Dollar ($)</option>
            </select>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger mb-3">
            {% for field in form %}{% for error in field.errors %}<p class="mb-0">{{ error }}</p>{% endfor %}{% endfor %}
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100 mb-3">
            <i class="bi bi-person-plus"></i> Créer mon compte
        </button>
    </form>
    <p class="text-center mb-0" style="color:var(--text2);font-size:0.9rem;">
        Déjà un compte ?
        <a href="{% url 'login' %}" style="color:var(--accent);text-decoration:none;font-weight:500;">Se connecter →</a>
    </p>
</div>
{% endblock %}
