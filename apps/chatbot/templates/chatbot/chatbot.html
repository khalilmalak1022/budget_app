{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 chatbot-page">

    <h1 class="page-title mb-4">
        <i class="bi bi-robot"></i> Chatbot IA
    </h1>

    <div class="card chatbot-card mb-4">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <label class="form-label">Pose ta question financière</label>

                <textarea 
                    name="question" 
                    class="form-control chatbot-textarea" 
                    rows="4"
                    placeholder="Exemple : Comment réduire mes dépenses ?"
                    required></textarea>

                <button type="submit" class="btn chatbot-btn w-100 mt-3">
                    Envoyer
                </button>
            </form>
        </div>
    </div>

    {% if reponse %}
    <div class="card chatbot-card">
        <div class="card-body">
            <h3 class="response-title">Réponse du chatbot</h3>
            <div class="chatbot-response">
                {{ reponse|linebreaks }}
            </div>
        </div>
    </div>
    {% endif %}

    {% if erreur %}
    <div class="alert alert-danger mt-4">
        {{ erreur }}
    </div>
    {% endif %}

</div>
{% endblock %}
