{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-trash"></i> Supprimer la catégorie</h4>
            </div>
            <div class="card-body p-4 text-center">
                <p class="fs-5">Voulez-vous vraiment supprimer :</p>
                <p class="fw-bold fs-4">{{ obj.nom }}</p>
                <p class="text-muted">
                    Les transactions liées ne seront pas supprimées.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Oui, supprimer
                        </button>
                        <a href="{% url 'categorie_liste' %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
