{% extends 'base.html' %}

{% block content %}
<div class="page-title">Mes Categories</div>
<div class="page-subtitle">Gerez vos categories de transactions</div>

<div class="d-flex justify-content-end mb-4">
    <a href="{% url 'categorie_ajouter' %}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Ajouter une categorie
    </a>
</div>

<div class="row">
    {% for cat in categories %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div style="width:40px;height:40px;border-radius:50%;
                        background:{{ cat.couleur }};flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;">
                        {% if cat.icone %}
                        <i class="{{ cat.icone }}" style="color:#fff;font-size:18px;"></i>
                        {% endif %}
                    </div>
                    <span style="color:#e8eaf0;font-weight:500;">
                        {{ cat.nom }}
                    </span>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'categorie_modifier' cat.pk %}"
                        class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'categorie_supprimer' cat.pk %}"
                        class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center">
        <p style="color:#8b95a8;">Aucune categorie pour le moment.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
