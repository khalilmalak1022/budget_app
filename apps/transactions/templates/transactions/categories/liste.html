{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-tags"></i> Mes Catégories</h2>
    <a href="{% url 'categorie_ajouter' %}" class="btn btn-success">
        <i class="bi bi-plus-circle"></i> Ajouter
    </a>
</div>

<div class="row">
    {% for cat in categories %}
    <div class="col-md-4 mb-3">
        <div class="card shadow">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <div style="width:20px;height:20px;border-radius:50%;
                        background:{{ cat.couleur }}"></div>
                    <span class="fw-500">{{ cat.nom }}</span>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'categorie_modifier' cat.pk %}"
                        class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="{% url 'categorie_supprimer' cat.pk %}"
                        class="btn btn-sm btn-danger">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center text-muted">
        <p>Aucune catégorie pour le moment.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
